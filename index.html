<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NSE Pro Dashboard + AI</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; margin: 0; padding: 20px; }
        .header { background: #1e293b; color: white; text-align: center; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        .sentiment-card { background: white; padding: 15px; border-radius: 12px; text-align: center; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #eee; font-size: 14px; }
        .green { color: #10b981; font-weight: bold; }
        .red { color: #ef4444; font-weight: bold; }
        
        /* AI Chat Box Styles */
        #chat-box { position: fixed; bottom: 20px; right: 20px; width: 320px; height: 400px; background: white; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); display: flex; flex-direction: column; overflow: hidden; border: 1px solid #ddd; }
        #chat-header { background: #3b82f6; color: white; padding: 12px; font-weight: bold; cursor: pointer; }
        #chat-logs { flex: 1; padding: 10px; overflow-y: auto; background: #f9fafb; font-size: 13px; }
        .msg { margin-bottom: 10px; padding: 8px 12px; border-radius: 10px; max-width: 80%; }
        .user-msg { background: #3b82f6; color: white; align-self: flex-end; margin-left: auto; }
        .ai-msg { background: #e5e7eb; color: #1f2937; }
        #chat-input-area { display: flex; padding: 10px; border-top: 1px solid #eee; }
        #chat-input { flex: 1; border: 1px solid #ddd; padding: 8px; border-radius: 5px; outline: none; }
    </style>
</head>
<body>

    <div class="header">
        <h1>🚀 NSE MASTER DASHBOARD</h1>
        <div id="last-updated">⏳ Fetching live data...</div>
    </div>

    <div class="sentiment-card">
        <h3>Current Market Mood</h3>
        <div id="sentiment-label" style="font-size: 24px; font-weight: bold;">Loading...</div>
    </div>

    <div class="grid">
        <div class="card">
            <h3 style="color: #3b82f6;">📊 Sectoral Performance</h3>
            <table id="sector-table"><tbody></tbody></table>
        </div>
        <div class="card">
            <h3 style="color: #10b981;">🟢 Top Gainers</h3>
            <table id="gainer-table"><tbody></tbody></table>
        </div>
        <div class="card">
            <h3 style="color: #ef4444;">🔴 Top Losers</h3>
            <table id="loser-table"><tbody></tbody></table>
        </div>
    </div>

    <div id="chat-box">
        <div id="chat-header">💬 Chat with Gemini Bhai</div>
        <div id="chat-logs" style="display: flex; flex-direction: column;">
            <div class="msg ai-msg">Bhai! Market ka data ready hai, kuch bhi puch lo. 🔥</div>
        </div>
        <div id="chat-input-area">
            <input type="text" id="chat-input" placeholder="Type message...">
            <button onclick="sendToAI()" style="margin-left:5px; cursor:pointer;">Send</button>
        </div>
    </div>

    <script>
        const API_BASE = "https://nse-top-gainer-and-loser.onrender.com";

        async function refreshData() {
            try {
                const res = await fetch(`${API_BASE}/api/all-data`);
                const d = await res.json();
                
                if(d.last_updated !== "Wait...") {
                    document.getElementById('last-updated').innerText = "✅ Updated: " + d.last_updated;
                    
                    // Sentiment
                    const s = document.getElementById('sentiment-label');
                    s.innerText = d.sentiment.label;
                    s.style.color = d.sentiment.color;

                    // Sectors
                    let sHtml = "";
                    d.sectoral.data.forEach(idx => {
                        sHtml += `<tr><td>${idx.name}</td><td class="${idx.chng > 0 ? 'green':'red'}">${idx.chng}%</td></tr>`;
                    });
                    document.getElementById('sector-table').innerHTML = sHtml;

                    // Gainers
                    let gHtml = "";
                    d.live_data.top_gainers.forEach(stk => {
                        gHtml += `<tr><td>${stk.Symbol}</td><td>${stk.LTP}</td><td class="green">+${stk.Change}%</td></tr>`;
                    });
                    document.getElementById('gainer-table').innerHTML = gHtml;

                    // Losers
                    let lHtml = "";
                    d.live_data.top_losers.forEach(stk => {
                        lHtml += `<tr><td>${stk.Symbol}</td><td>${stk.LTP}</td><td class="red">${stk.Change}%</td></tr>`;
                    });
                    document.getElementById('loser-table').innerHTML = lHtml;
                }
            } catch (e) { console.log("Fetch Error"); }
        }

        async function sendToAI() {
            const input = document.getElementById('chat-input');
            const logs = document.getElementById('chat-logs');
            if(!input.value) return;

            const userText = input.value;
            logs.innerHTML += `<div class="msg user-msg">${userText}</div>`;
            input.value = "";
            logs.scrollTop = logs.scrollHeight;

            try {
                const res = await fetch(`${API_BASE}/api/chat`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({message: userText})
                });
                const data = await res.json();
                logs.innerHTML += `<div class="msg ai-msg">${data.reply}</div>`;
                logs.scrollTop = logs.scrollHeight;
            } catch(e) {
                logs.innerHTML += `<div class="msg ai-msg">Error hai bhai!</div>`;
            }
        }

        setInterval(refreshData, 30000);
        refreshData();
    </script>
</body>
</html>
