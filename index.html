<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NSE Master Dashboard</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; }
        .header { background-color: #1e293b; color: white; text-align: center; padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { margin: 0; font-size: 26px; letter-spacing: 1px; }
        .time-box { font-size: 14px; color: #cbd5e1; margin-top: 8px; }
        
        /* Layout CSS */
        .dashboard-container { display: flex; flex-direction: column; gap: 20px; max-width: 1200px; margin: 0 auto; }
        .row { display: flex; gap: 20px; flex-wrap: wrap; }
        .card { background: white; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); padding: 20px; flex: 1; min-width: 320px; overflow-x: auto; }
        
        h2 { margin-top: 0; font-size: 18px; text-transform: uppercase; padding-bottom: 10px; border-bottom: 2px solid #f1f5f9; text-align: center; }
        .sector-title { color: #3b82f6; } .gainers-title { color: #10b981; } .losers-title { color: #ef4444; }
        
        /* Table CSS */
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px 10px; text-align: left; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
        th { background-color: #f8fafc; color: #475569; font-weight: 600; }
        tr:hover { background-color: #f8fafc; }
        
        .green-text { color: #10b981; font-weight: bold; }
        .red-text { color: #ef4444; font-weight: bold; }
        .bold-text { font-weight: bold; color: #334155; }
        .loading { text-align: center; font-size: 16px; font-weight: bold; color: #f59e0b; padding: 20px; }
    </style>
</head>
<body>

    <div class="dashboard-container">
        <div class="header">
            <h1>🚀 NSE MASTER DASHBOARD</h1>
            <div class="time-box" id="timestamp">⏳ Fetching Live Market Data...</div>
        </div>

        <div id="loading-msg" class="loading">Data Load Ho Raha Hai... Kripya Wait Karein...</div>

        <div id="main-content" style="display: none;">
            <div class="card" style="margin-bottom: 20px;">
                <h2 class="sector-title">📊 LIVE SECTORAL INDICES</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Index Name</th>
                            <th>LTP (₹)</th>
                            <th>% Change</th>
                            <th>Open</th>
                        </tr>
                    </thead>
                    <tbody id="sectors-body"></tbody>
                </table>
            </div>

            <div class="row">
                <div class="card">
                    <h2 class="gainers-title">🟢 TOP 20 GAINERS (F&O)</h2>
                    <table>
                        <thead>
                            <tr>
                                <th>Symbol</th>
                                <th>LTP</th>
                                <th>% Chng</th>
                                <th>Volume</th>
                            </tr>
                        </thead>
                        <tbody id="gainers-body"></tbody>
                    </table>
                </div>

                <div class="card">
                    <h2 class="losers-title">🔴 TOP 20 LOSERS (F&O)</h2>
                    <table>
                        <thead>
                            <tr>
                                <th>Symbol</th>
                                <th>LTP</th>
                                <th>% Chng</th>
                                <th>Volume</th>
                            </tr>
                        </thead>
                        <tbody id="losers-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Yahan apna Render ka link daal dena jab GitHub par upload karo
        // Example: const API_BASE_URL = "https://nse-top-gainer-and-loser.onrender.com";
        const API_BASE_URL = "http://127.0.0.1:8000"; 

        async function updateDashboard() {
            try {
                // Dono APIs ko ek sath call kar rahe hain (Fast loading ke liye)
                const [sectoralRes, gainersLosersRes] = await Promise.all([
                    fetch(API_BASE_URL + '/api/sectoral-indices'),
                    fetch(API_BASE_URL + '/api/live-data')
                ]);

                const sectoralData = await sectoralRes.json();
                const marketData = await gainersLosersRes.json();

                if (sectoralData.status === 'success' && marketData.status === 'success') {
                    document.getElementById('loading-msg').style.display = "none";
                    document.getElementById('main-content').style.display = "block";
                    document.getElementById('timestamp').innerText = "✅ Last Updated: " + marketData.timestamp + " | Auto-Refreshes every 2 mins";

                    // 1. Sectoral Table Update
                    let secHTML = "";
                    sectoralData.data.forEach(sec => {
                        let colorClass = sec.Percent_Change > 0 ? "green-text" : "red-text";
                        let sign = sec.Percent_Change > 0 ? "+" : "";
                        secHTML += `<tr>
                            <td class="bold-text">${sec.Index_Name}</td>
                            <td>${sec.Current_LTP}</td>
                            <td class="${colorClass}">${sign}${sec.Percent_Change}%</td>
                            <td>${sec.Open_Price}</td>
                        </tr>`;
                    });
                    document.getElementById('sectors-body').innerHTML = secHTML;

                    // 2. Gainers Table Update
                    let gainersHTML = "";
                    marketData.data.top_gainers.forEach(stock => {
                        gainersHTML += `<tr>
                            <td class="bold-text">${stock.Symbol}</td>
                            <td>${stock.LTP}</td>
                            <td class="green-text">+${stock.Change_Percent}%</td>
                            <td>${stock.Volume}</td>
                        </tr>`;
                    });
                    document.getElementById('gainers-body').innerHTML = gainersHTML;

                    // 3. Losers Table Update
                    let losersHTML = "";
                    marketData.data.top_losers.forEach(stock => {
                        losersHTML += `<tr>
                            <td class="bold-text">${stock.Symbol}</td>
                            <td>${stock.LTP}</td>
                            <td class="red-text">${stock.Change_Percent}%</td>
                            <td>${stock.Volume}</td>
                        </tr>`;
                    });
                    document.getElementById('losers-body').innerHTML = losersHTML;
                }
            } catch (error) {
                console.error("Dashboard update error:", error);
                document.getElementById('timestamp').innerText = "❌ Data fetch failed. Please check backend.";
            }
        }

        // Pehli baar load karo
        updateDashboard();
        
        // Har 120 seconds (2 minute) me refresh karo
        setInterval(updateDashboard, 120000);
    </script>
</body>
</html>
