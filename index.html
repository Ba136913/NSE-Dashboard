<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live NSE F&O Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background-color: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #333;
        }
        .loading {
            text-align: center;
            font-size: 24px;
            color: #666;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: center;
        }
        th {
            background-color: #f2f2f2;
            color: #333;
        }
        .gainers th {
            background-color: #d4edda;
            color: green;
        }
        .losers th {
            background-color: #f8d7da;
            color: red;
        }
        .gain { color: green; }
        .loss { color: red; }
        .timestamp {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🟡 Live NSE F&O Market Dashboard</h1>
        <div id="loading" class="loading">Loading / Fetching Data...</div>
        <div id="content" style="display: none;">
            <h2>🟢 Top 20 Gainers</h2>
            <table class="gainers">
                <thead>
                    <tr>
                        <th>Symbol</th>
                        <th>LTP (₹)</th>
                        <th>% Change</th>
                    </tr>
                </thead>
                <tbody id="gainers-body"></tbody>
            </table>
            <h2>🔴 Top 20 Losers</h2>
            <table class="losers">
                <thead>
                    <tr>
                        <th>Symbol</th>
                        <th>LTP (₹)</th>
                        <th>% Change</th>
                    </tr>
                </thead>
                <tbody id="losers-body"></tbody>
            </table>
            <div class="timestamp" id="timestamp"></div>
        </div>
    </div>

    <script>
        const API_URL = '/api/live-data';

        async function fetchData() {
            try {
                const response = await fetch(API_URL);
                if (response.ok) {
                    const data = await response.json();
                    displayData(data.gainers, data.losers, data.last_updated);
                } else {
                    throw new Error('Failed to fetch data');
                }
            } catch (error) {
                console.error('Error fetching data:', error);
                setTimeout(fetchData, 5000);  // Retry after 5 seconds
            }
        }

        function displayData(gainers, losers, lastUpdated) {
            const loading = document.getElementById('loading');
            const content = document.getElementById('content');
            loading.style.display = 'none';
            content.style.display = 'block';

            const gainersBody = document.getElementById('gainers-body');
            const losersBody = document.getElementById('losers-body');

            gainersBody.innerHTML = '';
            losersBody.innerHTML = '';

            gainers.forEach(stock => {
                const row = `<tr>
                    <td>${stock.symbol}</td>
                    <td>${stock.ltp}</td>
                    <td class="gain">${stock.change}%</td>
                </tr>`;
                gainersBody.innerHTML += row;
            });

            losers.forEach(stock => {
                const row = `<tr>
                    <td>${stock.symbol}</td>
                    <td>${stock.ltp}</td>
                    <td class="loss">${stock.change}%</td>
                </tr>`;
                losersBody.innerHTML += row;
            });

            const timestampDiv = document.getElementById('timestamp');
            const date = new Date(lastUpdated * 1000);
            timestampDiv.textContent = `Last Updated: ${date.toLocaleString()}`;
        }

        // Initial load
        fetchData();

        // Refresh every 2 minutes
        setInterval(fetchData, 120000);
    </script>
</body>
</html>
