<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Official NSE Live Terminal</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f0f4f8; margin: 0; padding: 20px; color: #333; }
        .header { text-align: center; background: #1e293b; color: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { margin: 0; font-size: 28px; letter-spacing: 1px; }
        .time-box { font-size: 14px; color: #94a3b8; margin-top: 10px; font-weight: bold; }
        
        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
        .card { background: white; border-radius: 10px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); overflow-x: auto; }
        h2 { margin-top: 0; padding-bottom: 10px; border-bottom: 2px solid #f1f5f9; font-size: 18px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
        th { color: #64748b; font-weight: 600; text-transform: uppercase; font-size: 12px; }
        
        .green { color: #10b981; font-weight: bold; }
        .red { color: #ef4444; font-weight: bold; }
        .symbol { font-weight: bold; color: #1e293b; }
    </style>
</head>
<body>

    <div class="header">
        <h1>🚀 OFFICIAL NSE F&O TERMINAL</h1>
        <div class="time-box" id="timestamp">⏳ Connecting to Server...</div>
    </div>

    <div class="grid-container" id="dashboard" style="display: none;">
        <div class="card">
            <h2 style="color: #3b82f6;">📊 Sectoral Indices</h2>
            <table>
                <thead><tr><th>INDEX</th><th>LTP</th><th>% CHG</th></tr></thead>
                <tbody id="indices-body"></tbody>
            </table>
        </div>

        <div class="card">
            <h2 style="color: #10b981;">🟢 Top 20 Gainers</h2>
            <table>
                <thead><tr><th>SYMBOL</th><th>LTP</th><th>% CHG</th></tr></thead>
                <tbody id="gainers-body"></tbody>
            </table>
        </div>

        <div class="card">
            <h2 style="color: #ef4444;">🔴 Top 20 Losers</h2>
            <table>
                <thead><tr><th>SYMBOL</th><th>LTP</th><th>% CHG</th></tr></thead>
                <tbody id="losers-body"></tbody>
            </table>
        </div>
    </div>

    <script>
        // 🔥 YAHAN TERA RENDER KA LINK HAI 🔥
        const API_URL = "https://nse-top-gainer-and-loser.onrender.com/api/live-data"; 

        async function fetchData() {
            try {
                const res = await fetch(API_URL);
                const result = await res.json();

                if (result.status === 'success') {
                    document.getElementById('dashboard').style.display = "grid";
                    document.getElementById('timestamp').innerText = "✅ Last Updated: " + result.timestamp + " (Auto-refresh every 1 min)";

                    let idxHtml = "";
                    result.data.indices.forEach(item => {
                        let cls = item.Change_Percent > 0 ? 'green' : (item.Change_Percent < 0 ? 'red' : '');
                        let sign = item.Change_Percent > 0 ? '+' : '';
                        idxHtml += `<tr><td class="symbol">${item.Index}</td><td>₹${item.LTP}</td><td class="${cls}">${sign}${item.Change_Percent}%</td></tr>`;
                    });
                    document.getElementById('indices-body').innerHTML = idxHtml;

                    let gHtml = "";
                    result.data.top_gainers.forEach(item => {
                        let sign = item.Change_Percent > 0 ? '+' : '';
                        gHtml += `<tr><td class="symbol">${item.Symbol}</td><td>₹${item.LTP}</td><td class="green">${sign}${item.Change_Percent}%</td></tr>`;
                    });
                    document.getElementById('gainers-body').innerHTML = gHtml;

                    let lHtml = "";
                    result.data.top_losers.forEach(item => {
                        lHtml += `<tr><td class="symbol">${item.Symbol}</td><td>₹${item.LTP}</td><td class="red">${item.Change_Percent}%</td></tr>`;
                    });
                    document.getElementById('losers-body').innerHTML = lHtml;
                } else {
                    document.getElementById('timestamp').innerText = "⏳ Server fetching NSE data... Please wait.";
                }
            } catch (error) {
                document.getElementById('timestamp').innerText = "❌ Connection Failed. Checking backend...";
            }
        }

        fetchData();
        setInterval(fetchData, 60000); 
    </script>
</body>
</html>
